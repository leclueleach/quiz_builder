<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Quiz Builder</h1>
      <p>Build and export a platform-ready CourseBook quiz.</p>
    </div>
    <div class="header-actions">
      <button type="button" class="secondary" onclick="previewQuiz()">Preview Quiz</button>
      <button type="button" class="secondary" onclick="validateQuiz(true)">Validate</button>
      <button type="button" onclick="exportStandaloneQuiz()">Export Quiz</button>
    </div>
  </header>

  <main id="builder" class="builder-layout">
    <aside class="settings-panel">
      <h2>Quiz settings</h2>
      <label for="quizFilename">Folder/output name</label>
      <input type="text" id="quizFilename" placeholder="chapter3_review">

      <label for="questionCount">Number of questions</label>
      <select id="questionCount">
        <option value="5">5 Questions</option>
        <option value="10">10 Questions</option>
      </select>
      <button type="button" onclick="generateQuestionFields()">Create / Reset Quiz</button>

      <details class="advanced-settings">
        <summary>Advanced settings</summary>
        <label class="checkbox-row" for="passPercentageEnabled">
          <input type="checkbox" id="passPercentageEnabled">
          Enable pass percentage
        </label>
        <label for="passPercentage">Pass percentage</label>
        <input type="number" id="passPercentage" min="0" max="100" value="50" disabled>
      </details>

      <div class="correct-answer-control" id="correctAnswerControl">
        <label for="activeCorrectAnswer">Correct answer</label>
        <select id="activeCorrectAnswer" onchange="updateActiveCorrectAnswer(this.value)">
          <option value="0">Answer 1</option>
          <option value="1">Answer 2</option>
          <option value="2">Answer 3</option>
          <option value="3">Answer 4</option>
        </select>
      </div>

      <hr>
      <label for="importHtmlFile">Import standalone HTML</label>
      <input type="file" id="importHtmlFile" accept=".html">
      <button type="button" class="secondary" onclick="importStandaloneHtml()">Import HTML</button>
    </aside>

    <section class="workspace">
      <div class="shared-toolbar" id="sharedToolbar" aria-label="Text formatting toolbar">
        <span id="activeFieldLabel">Select a text field</span>
        <select id="fontSizeControl" onchange="formatActiveFontSize(this.value)">
          <option value="">Size</option>
          <option value="40">40</option><option value="32">32</option><option value="24">24</option>
          <option value="20">20</option><option value="18">18</option><option value="16">16</option>
          <option value="14">14</option><option value="13">13</option>
        </select>
        <button type="button" onclick="formatActiveText('bold')"><b>B</b></button>
        <button type="button" onclick="formatActiveText('italic')"><i>I</i></button>
        <button type="button" onclick="formatActiveText('underline')"><u>U</u></button>
        <button type="button" onclick="formatActiveText('superscript')">X²</button>
        <button type="button" onclick="formatActiveText('subscript')">X₂</button>
        <button type="button" onclick="formatActiveText('insertUnorderedList')">• List</button>
        <button type="button" onclick="formatActiveText('insertOrderedList')">1. List</button>
        <select id="symbolControl" onchange="insertActiveSymbol(this.value)">
          <option value="">Symbol</option><option>²</option><option>³</option><option>₀</option><option>₁</option>
          <option>₂</option><option>₃</option><option>°</option><option>±</option><option>×</option>
          <option>÷</option><option>≤</option><option>≥</option><option>√</option><option>π</option>
        </select>
        <button type="button" onclick="toggleActiveHtmlMode()">&lt;/&gt;</button>
      </div>

      <nav id="questionTabs" class="page-navigation"></nav>
      <div id="questionsContainer" class="canvas-area"></div>
      <div class="page-controls">
        <button type="button" class="secondary" onclick="moveBuilderPage(-1)">Previous</button>
        <span id="pageIndicator"></span>
        <button type="button" class="secondary" onclick="moveBuilderPage(1)">Next</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
